name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel in-progress runs for same workflow + branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: |
          requirements-ci.txt
          requirements.txt

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip wheel setuptools

    - name: Install CI dependencies
      run: |
        pip install -r requirements-ci.txt

    - name: Verify imports
      run: |
        python -c "import fastapi; print(f'FastAPI: {fastapi.__version__}')"
        python -c "import pydantic; print(f'Pydantic: {pydantic.__version__}')"
        python -c "import pytest; print(f'Pytest: {pytest.__version__}')"

    - name: Lint with ruff
      run: ruff check src/ --output-format=github
      continue-on-error: false

    - name: Type check with mypy
      run: mypy src/ --ignore-missing-imports --no-error-summary
      continue-on-error: true

    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term --tb=short --strict-markers -p no:warnings

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      continue-on-error: true
      with:
        fail_ci_if_error: false
        files: coverage.xml
        flags: unittests-py${{ matrix.python-version }}

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit safety

    - name: Run pip-audit
      run: pip-audit --requirement requirements-ci.txt --progress-spinner off
      continue-on-error: true

    - name: Run safety scan
      run: safety scan --file requirements-ci.txt
      continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run on all branches to catch Docker issues early
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build optimized Docker image
      run: |
        if [ -f Dockerfile.optimized ]; then
          docker build -f Dockerfile.optimized -t autonomos:latest . --progress=plain
        elif [ -f Dockerfile ]; then
          docker build -t autonomos:latest . --progress=plain
        else
          echo "::error::No Dockerfile found"
          exit 1
        fi

    - name: Test Docker image
      run: |
        docker run -d --name ci-test autonomos:latest sleep 30 || true
        sleep 5
        docker logs ci-test || true
        docker inspect autonomos:latest --format='{{.Size}}' | awk '{print "Image size: " $1/1024/1024 " MB"}'
        docker rm -f ci-test || true

    - name: Verify image size
      run: |
        SIZE=$(docker inspect autonomos:latest --format='{{.Size}}' | awk '{print $1/1024/1024}')
        echo "Docker image size: ${SIZE} MB"
        # Warn if image exceeds 600MB (target is 480MB)
        if (( $(echo "$SIZE > 600" | bc -l) )); then
          echo "::warning::Docker image exceeds 600MB target. Consider optimizing."
        fi
