name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # Fix #1: stop cascade cancellations
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1          # Fix #2: shallow clone prevents HTTP 500 / packfile errors

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: requirements-ci.txt

    - name: Install CI dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-ci.txt  # Fix #3: lightweight deps only

    - name: Lint with ruff
      run: ruff check src/

    - name: Type check with mypy
      run: mypy src/ --ignore-missing-imports
      continue-on-error: true

    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --tb=short -p no:warnings

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5   # Fix #5: upgrade from v3, v3 tarball endpoint returns 500
      continue-on-error: true
      with:
        fail_ci_if_error: false
        files: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit safety

    - name: Run pip-audit
      run: pip-audit --requirement requirements-ci.txt  # Fix #4a: scan file, not whole env
      continue-on-error: true

    - name: Run safety scan
      run: safety scan --file requirements-ci.txt       # Fix #4b: 'safety check' removed in v3
      continue-on-error: true

  docker:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Build Docker image
      run: |
        if [ -f Dockerfile.optimized ]; then
          docker build -f Dockerfile.optimized -t autonomos:latest .
        elif [ -f Dockerfile ]; then
          docker build -t autonomos:latest .
        else
          echo "No Dockerfile found, skipping build"
        fi

    - name: Test Docker image
      run: |
        if docker image inspect autonomos:latest &>/dev/null; then
          docker run -d --name ci-test autonomos:latest sleep 10 || true
          sleep 3
          docker logs ci-test || true
          docker rm -f ci-test || true
        fi
